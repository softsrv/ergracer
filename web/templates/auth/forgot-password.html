{{define "title"}}Reset Password{{end}}

{{define "content"}}
<div class="card bg-base-100 shadow-xl">
  <div class="card-body">
    <h2 class="card-title text-2xl justify-center mb-4">Reset Password</h2>
    <p class="text-sm text-base-content/70 mb-4">
      Enter your email address and we'll send you a reset link if an account exists.
    </p>

    <div id="form-result"></div>

    <form hx-post="/auth/forgot-password"
          hx-target="#form-result"
          hx-swap="innerHTML"
          class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />

      <div class="form-control">
        <label class="label" for="email">
          <span class="label-text">Email</span>
        </label>
        <input id="email" name="email" type="email" required
               class="input input-bordered w-full"
               autocomplete="email" />
      </div>

      <button type="submit" class="btn btn-primary w-full">Send Reset Link</button>
    </form>

    <p class="text-center text-sm mt-4">
      <a href="/login" class="link link-hover">Back to sign in</a>
    </p>
  </div>
</div>
{{end}}
