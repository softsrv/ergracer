{{define "title"}}Set New Password{{end}}

{{define "content"}}
<div class="card bg-base-100 shadow-xl">
  <div class="card-body">
    <h2 class="card-title text-2xl justify-center mb-4">Set New Password</h2>

    <div id="form-error"></div>

    <form hx-post="/auth/reset-password"
          hx-target="#form-error"
          hx-swap="innerHTML"
          class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
      <input type="hidden" name="token" value="{{.Token}}" />

      <div class="form-control">
        <label class="label" for="password">
          <span class="label-text">New Password</span>
        </label>
        <input id="password" name="password" type="password" required
               class="input input-bordered w-full"
               autocomplete="new-password"
               minlength="8" />
      </div>

      <button type="submit" class="btn btn-primary w-full">Set Password</button>
    </form>
  </div>
</div>
{{end}}
